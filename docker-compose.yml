# 菜鸟庆面试系统 — 本地一键起(前端 + 后端一体,与 Render 用同一个 Dockerfile/镜像)
# 用法:
#   docker compose up --build       # 构建并启动
#   打开 http://localhost:8000       # 前端 + 后端(/api、/ws/interview)都在这一个容器里
# 密钥从根目录 .env 读取(QWEN_API_KEY / DEEPSEEK_API_KEY / HEYGEN_API_KEY)。
services:
  app:
    build: .
    image: cainiaoqing-interview
    container_name: cainiaoqing-interview
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
